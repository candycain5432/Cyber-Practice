<!DOCTYPE html>
<html>

<head>
<title>Send Message</title>

<style>
body{
font-family:Arial;
padding:40px;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px;
}
</style>

</head>

<body>

<h2>Send Text</h2>

<input id="textBox" placeholder="Type something">
<button onclick="sendMessage()">Send</button>

<script>

function sendMessage(){

const text = document.getElementById("textBox").value

fetch("/send",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
})
.then(res=>res.json())
.then(data=>console.log(data))

}

</script>

</body>

</html>
