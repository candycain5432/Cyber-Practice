<!DOCTYPE html>
<html>

<body>

<h2>Send Message</h2>

<input id="msg">
<button onclick="send()">Send</button>

<script>

function send(){

const text=document.getElementById("msg").value

fetch("https://cyber-practice.onrender.com/send",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
})
.then(r=>r.json())
.then(d=>console.log(d))

}

</script>

</body>
</html>
